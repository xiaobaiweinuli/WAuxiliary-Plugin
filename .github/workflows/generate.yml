name: 生成插件列表

on:
  push:
    branches: [ main ]
    paths:
      - "plugins/**"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-plugins:
    name: 生成插件数据
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 配置 Node.js 环境
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 生成插件列表
        run: |
          node scripts/generate.js
          echo "插件列表生成完成"

      - name: 提交生成结果
        if: success()
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/index.json README.md
          if git diff --staged --quiet; then
            echo "没有可提交的变更"
          else
            git commit -m "文档: 更新插件列表"
            git push
          fi